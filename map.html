<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>地図から駅を選ぶ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; }
#map { position: fixed; top: 0; left: 0; right: 0; bottom: 52px; }
#panel { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: #fff; border-top: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 8px; z-index: 1000; }
#panel button { padding: 8px 14px; border-radius: 20px; font-weight: 600; font-size: 0.82rem; cursor: pointer; border: 2px solid; white-space: nowrap; }
.btn-from { background: #0089c7; color: #fff; border-color: #0089c7; }
.btn-to { background: #e67e00; color: #fff; border-color: #e67e00; }
.btn-from.dim, .btn-to.dim { opacity: 0.4; }
.btn-back { background: #fff; color: #333; border-color: #aaa; }
.btn-search { background: #28a745; color: #fff; border-color: #28a745; }
#status { position: fixed; top: 10px; left: 10px; right: 10px; z-index: 1000; pointer-events: none; }
#status span { display: inline-block; background: rgba(255,255,255,0.93); border-radius: 8px; padding: 6px 12px; font-size: 0.82rem; box-shadow: 0 1px 4px rgba(0,0,0,0.15); pointer-events: auto; max-width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<div id="status"><span id="status-text">読み込み中…</span></div>
<div id="panel">
  <button class="btn-from" id="btn-from" onclick="setMode('from')">出発駅</button>
  <button class="btn-to dim" id="btn-to" onclick="setMode('to')">到着駅</button>
  <button class="btn-search" id="btn-go" onclick="goSearch()" style="display:none">検索</button>
  <button class="btn-back" onclick="location.href='index.html#search'">戻る</button>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const savedForm = JSON.parse(localStorage.getItem('norikae-form') || '{}');
const RADIUS_KM_FROM = savedForm.fromRadius ? parseFloat(savedForm.fromRadius) : 1.5;
const RADIUS_KM_TO = savedForm.toRadius ? parseFloat(savedForm.toRadius) : 1.5;
let mode = 'from';
let chosen = { from: null, to: null };

// Load station data from index.html's script (extract minimal data)
let S, STATION_COORDS, LINES, HIDDEN_STATIONS, grpData;

(async () => {
  const text = await (await fetch('index.html')).text();
  const m = text.match(/<script>([\s\S]*?)<\/script>/);
  if (!m) throw new Error("Failed to load script from index.html");

  // UI定義の手前までのデータ初期化ロジックを抽出
  const appScript = m[1].split('// === UI ===')[0];

  // 必要な変数をグローバルにエクスポートするコードを追加してeval実行
  const exportCode = `
    window.__app_data = {
      S,
      STATION_COORDS,
      LINES,
      HIDDEN_STATIONS,
      CROSS_TRANSFERS
    };
  `;

  try {
    (0, eval)(appScript + exportCode);
  } catch (e) {
    console.error("Failed to evaluate index.html script:", e);
    document.getElementById('status-text').textContent = 'データ読み込みエラーが発生しました';
    return;
  }

  const data = window.__app_data;
  S = data.S;
  STATION_COORDS = data.STATION_COORDS;
  LINES = data.LINES;
  HIDDEN_STATIONS = data.HIDDEN_STATIONS;
  const CROSS_TRANSFERS = data.CROSS_TRANSFERS;

  // Build grp (Union-Find for same-name + cross-transfers)
  const N = S.length;
  const parent = Array.from({length: N}, (_, i) => i);
  function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
  function union(a, b) { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }

  // Same-name (skip sparse undefined elements)
  const nameMap = {};
  for (const item of S) {
    if (!item) continue;
    const [id, name] = item;
    if (!nameMap[name]) nameMap[name] = [];
    nameMap[name].push(id);
  }
  for (const ids of Object.values(nameMap)) { for (let i = 1; i < ids.length; i++) union(ids[0], ids[i]); }

  // Cross-transfers
  for (const [a, b] of CROSS_TRANSFERS) union(a, b);
  grpData = parent.map((_, i) => find(i));

  buildMap();
})();

function buildMap() {
  const map = L.map('map').setView([35.69, 139.75], 12);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom: 18
  }).addTo(map);

  // Group stations by grp
  const byGrp = {};
  for (const [idStr, [lat, lon]] of Object.entries(STATION_COORDS)) {
    const id = parseInt(idStr);
    if (!S[id]) continue;
    if (HIDDEN_STATIONS.has(id)) continue;
    const g = grpData[id];
    if (!byGrp[g]) byGrp[g] = { lat, lon, names: new Set(), lines: [] };
    byGrp[g].names.add(S[id][1]);
    byGrp[g].lines.push(S[id][2]);
  }

  for (const [, info] of Object.entries(byGrp)) {
    const name = [...info.names][0];
    const color = LINES[info.lines[0]] ? LINES[info.lines[0]].color : '#666';
    const m = L.circleMarker([info.lat, info.lon], {
      radius: 5, fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.9
    }).addTo(map);
    m.bindTooltip(name, { direction: 'top', offset: [0, -6] });
    m.on('click', () => pickStation(name));
  }

  map.on('click', e => pickArea(e.latlng.lat, e.latlng.lng));
  document.getElementById('status-text').textContent = '駅をタップ、または地図をタップで付近の駅を設定';
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-from').className = 'btn-from' + (m === 'from' ? '' : ' dim');
  document.getElementById('btn-to').className = 'btn-to' + (m === 'to' ? '' : ' dim');
}

function pickStation(name) {
  chosen[mode] = { type: 'station', name };
  document.getElementById('status-text').textContent = (mode === 'from' ? '出発' : '到着') + ': ' + name;
  if (mode === 'from') setMode('to');
  updateGoBtn();
}

function pickArea(lat, lon) {
  const R = 6371;
  const radiusKm = mode === 'from' ? RADIUS_KM_FROM : RADIUS_KM_TO;
  const nearby = [];
  for (const [idStr, [sLat, sLon]] of Object.entries(STATION_COORDS)) {
    const id = parseInt(idStr);
    if (!S[id]) continue;
    if (HIDDEN_STATIONS.has(id)) continue;
    const dLat = (sLat - lat) * Math.PI / 180;
    const dLon = (sLon - lon) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat*Math.PI/180)*Math.cos(sLat*Math.PI/180)*Math.sin(dLon/2)**2;
    const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    if (d <= radiusKm) nearby.push(S[id][1]);
  }
  const names = [...new Set(nearby)];
  if (names.length === 0) {
    document.getElementById('status-text').textContent = '半径' + radiusKm + 'km以内に駅がありません';
    return;
  }
  chosen[mode] = { type: 'area', lat, lon, names };
  const preview = names.slice(0, 4).join(', ') + (names.length > 4 ? '…' : '');
  document.getElementById('status-text').textContent = (mode === 'from' ? '出発' : '到着') + ': ' + preview + ' (' + names.length + '駅)';
  if (mode === 'from') setMode('to');
  updateGoBtn();
}

function updateGoBtn() {
  document.getElementById('btn-go').style.display = (chosen.from && chosen.to) ? '' : 'none';
}

function goSearch() {
  const f = chosen.from, t = chosen.to;
  if (!f || !t) return;
  // Pass to index.html via localStorage
  const data = JSON.parse(localStorage.getItem('norikae-form') || '{}');
  
  if (f.type === 'station') { data.from = f.name; data.fromLine = ''; delete data.fromArea; }
  else { data.from = '__area__'; data.fromArea = { lat: f.lat, lon: f.lon }; }
  
  if (t.type === 'station') { data.to = t.name; data.toLine = ''; delete data.toArea; }
  else { data.to = '__area__'; data.toArea = { lat: t.lat, lon: t.lon }; }
  
  localStorage.setItem('norikae-form', JSON.stringify(data));
  location.href = 'index.html#search';
}
</script>
</body>
</html>
