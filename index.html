// === DIJKSTRA ===
function dijkstra(sources) {
  const dist = new Float64Array(N).fill(Infinity);
  const prev = new Int32Array(N).fill(-1);
  // Min-heap: [distance, nodeId]
  const heap = [];
  function push(d, u) {
    heap.push([d, u]);
    let i = heap.length - 1;
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (heap[p][0] <= heap[i][0]) break;
      [heap[p], heap[i]] = [heap[i], heap[p]];
      i = p;
    }
  }
  function pop() {
    const top = heap[0];
    const last = heap.pop();
    if (heap.length > 0) {
      heap[0] = last;
      let i = 0;
      while (true) {
        let s = i, l = 2*i+1, r = 2*i+2;
        if (l < heap.length && heap[l][0] < heap[s][0]) s = l;
        if (r < heap.length && heap[r][0] < heap[s][0]) s = r;
        if (s === i) break;
        [heap[i], heap[s]] = [heap[s], heap[i]];
        i = s;
      }
    }
    return top;
  }

  for (const s of sources) {
    dist[s] = 0;
    push(0, s);
  }

  while (heap.length > 0) {
    const [d, u] = pop();
    if (d > dist[u]) continue;
    for (const { to: v, w } of adj[u]) {
      const nd = d + w;
      if (nd < dist[v]) {
        dist[v] = nd;
        prev[v] = u;
        push(nd, v);
      }
    }
  }
  return { dist, prev };
}

function findRoute(fromName, toName) {
  const srcIds = nameToIds[fromName];
  const dstIds = nameToIds[toName];
  if (!srcIds || !dstIds) return null;

  // Also include cross-transfer stations
  const srcSet = new Set(srcIds);
  const dstSet = new Set(dstIds);
  addCrossTransferIds(fromName, srcSet);
  addCrossTransferIds(toName, dstSet);

  const { dist, prev } = dijkstra([...srcSet]);

  let bestDist = Infinity, bestDst = -1;
  for (const d of dstSet) {
    if (dist[d] < bestDist) {
      bestDist = dist[d];
      bestDst = d;
    }
  }
  if (bestDst === -1 || bestDist === Infinity) return null;

  // Among destinations with same best distance, prefer one whose predecessor
  // is on the same line (avoids unnecessary trailing transfer in display)
  const sameDist = [...dstSet].filter(d => dist[d] === bestDist);
  if (sameDist.length > 1) {
    for (const d of sameDist) {
      if (prev[d] >= 0 && S[prev[d]][2] === S[d][2]) { bestDst = d; break; }
    }
  }

  const path = [];
  let cur = bestDst;
  while (cur !== -1) {
    path.push(cur);
    cur = prev[cur];
  }
  path.reverse();

  return { distance: Math.round(bestDist * 10) / 10, path };
}

  "淡路町": ["新御茶ノ水"], "新御茶ノ水": ["淡路町"],
  "銀座": ["銀座一丁目"], "銀座一丁目": ["銀座"],
  "人形町": ["水天宮前"], "水天宮前": ["人形町"],
  "築地": ["新富町"], "新富町": ["築地"],
  "日比谷": ["有楽町"], "有楽町": ["日比谷"],
};
function addCrossTransferIds(name, idSet) {
  if (CROSS_NAME_MAP[name]) {
    for (const cn of CROSS_NAME_MAP[name]) {
      if (nameToIds[cn]) nameToIds[cn].forEach(id => idSet.add(id));
    }
  }
}

// === UI ===
// Build unique station list for datalist
const uniqueNames = [];
const seen = new Set();
for (const [, name] of S) {
  if (!seen.has(name)) {
    seen.add(name);
    uniqueNames.push(name);
  }
}

const dl = document.getElementById("sl");
for (const name of uniqueNames) {
  const ids = nameToIds[name];
  const lineNames = ids.map(id => LINES[S[id][2]].name);
  const o = document.createElement("option");
  o.value = name;
  o.label = name + "（" + [...new Set(lineNames)].join("・") + "）";
  dl.appendChild(o);
}

function swapStations() {
  const f = document.getElementById("from");
  const t = document.getElementById("to");
  [f.value, t.value] = [t.value, f.value];
}

function calculate() {
  const fromName = document.getElementById("from").value.trim();
  const toName = document.getElementById("to").value.trim();
  const resultEl = document.getElementById("result");

  if (!fromName || !toName) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">出発駅と到着駅を入力してください</div>';
    return;
  }
  if (fromName === toName) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">出発駅と到着駅が同じです</div>';
    return;
  }
  if (!nameToIds[fromName]) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">「' + escHtml(fromName) + '」は見つかりません</div>';
    return;
  }
  if (!nameToIds[toName]) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">「' + escHtml(toName) + '」は見つかりません</div>';
    return;
  }

  const result = findRoute(fromName, toName);
  if (!result) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">経路が見つかりませんでした</div>';
    return;
  }

  const fare = getFare(result.distance);
  let html = '<div class="fare-display">';
  html += '<div class="fare-main">' + fare.ticket + '<span>円（きっぷ）</span></div>';
  html += '<div class="fare-sub">IC: <b>' + fare.ic + '円</b></div>';
  html += '<div class="distance">営業キロ: ' + result.distance.toFixed(1) + ' km</div>';
  html += '</div>';

  // Route display
  html += '<div class="route"><div class="route-title">経路</div>';
  html += buildRouteHtml(result.path);
  html += '</div>';

  resultEl.className = "card result show";
  resultEl.innerHTML = html;
}

function buildRouteHtml(path) {
  if (path.length === 0) return "";

  const segments = [];
  let curLine = S[path[0]][2];
  let curStations = [path[0]];

  for (let i = 1; i < path.length; i++) {
    const line = S[path[i]][2];
    if (line !== curLine) {
      segments.push({ line: curLine, stations: curStations });
      curLine = line;
      curStations = [path[i]];
    } else {
      curStations.push(path[i]);
    }
  }
  segments.push({ line: curLine, stations: curStations });

  let html = "";
  for (let si = 0; si < segments.length; si++) {
    const seg = segments[si];
    const li = LINES[seg.line];
    const c = li.color;
    const first = seg.stations[0];
    const last = seg.stations[seg.stations.length - 1];
    const stCount = seg.stations.length;

    // Start station of segment
    html += '<div class="route-station">';
    html += '<div class="route-dot" style="border-color:' + c + '"></div>';
    html += '<div class="route-name">' + escHtml(S[first][1]);
    html += '<span class="line-badge" style="background:' + c + '">' + li.name + '</span>';
    if (si > 0) html += '<span class="route-transfer">乗換</span>';
    html += '</div></div>';

    // Middle info
    if (stCount > 1) {
      html += '<div class="route-segment">';
      html += '<div class="route-segment-bar" style="background:' + c + '"></div>';
      html += '<div class="route-segment-info">';
      if (stCount > 2) html += (stCount - 2) + '駅';
      html += '</div></div>';

      // End station of segment
      html += '<div class="route-station">';
      html += '<div class="route-dot" style="border-color:' + c + '"></div>';
      html += '<div class="route-name">' + escHtml(S[last][1]);
      html += '<span class="line-badge" style="background:' + c + '">' + li.name + '</span>';
      html += '</div></div>';
    }

    // Transfer connector
    if (si < segments.length - 1) {
      const nc = LINES[segments[si+1].line].color;
      html += '<div class="route-segment">';
      html += '<div class="route-segment-bar" style="background:linear-gradient(' + c + ',' + nc + ')"></div>';
      html += '<div class="route-segment-info" style="color:#e67e00">⇅ 乗換</div>';
      html += '</div>';
    }
  }
  return html;
}

function isCrossTransfer(a, b) {
  for (const [u, v] of CROSS_TRANSFERS) {
    if ((u === a && v === b) || (u === b && v === a)) return true;
  }
  return false;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Enter key triggers calculation
document.getElementById("from").addEventListener("keydown", e => { if (e.key === "Enter") calculate(); });
document.getElementById("to").addEventListener("keydown", e => { if (e.key === "Enter") calculate(); });
</script>
