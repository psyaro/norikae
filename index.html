  adj[u].push({ to: v, w });

}

  for (let i = 0; i < ids.length; i++) {
    for (let j = i + 1; j < ids.length; j++) {
      addEdge(ids[i], ids[j], 0);

const uf = Array.from({length: N}, (_, i) => i);
function ufFind(x) { while (uf[x] !== x) { uf[x] = uf[uf[x]]; x = uf[x]; } return x; }
function ufUnion(a, b) { uf[ufFind(a)] = ufFind(b); }
for (const ids of Object.values(nameToIds)) {
  for (let i = 1; i < ids.length; i++) ufUnion(ids[0], ids[i]);
}
for (const [u, v] of CROSS_TRANSFERS) ufUnion(u, v);
const grp = new Uint16Array(N);
const grpMap = {};
let gid = 0;
for (let i = 0; i < N; i++) { const r = ufFind(i); if (!(r in grpMap)) grpMap[r] = gid++; grp[i] = grpMap[r]; }

// === MIN-HEAP ===
function hPush(h, e) { h.push(e); let i=h.length-1; while(i>0){const p=(i-1)>>1;if(h[p][0]<=h[i][0])break;[h[p],h[i]]=[h[i],h[p]];i=p;} }
function hPop(h) { const t=h[0];const l=h.pop();if(h.length>0){h[0]=l;let i=0;while(true){let s=i,a=2*i+1,b=2*i+2;if(a<h.length&&h[a][0]<h[s][0])s=a;if(b<h.length&&h[b][0]<h[s][0])s=b;if(s===i)break;[h[i],h[s]]=[h[s],h[i]];i=s;}}return t; }

// === ROUTE FINDING (penalty-based iterative Dijkstra) ===
function routeSig(path) {
  const segs = [];
  let curLine = S[path[0]][2], startG = grp[path[0]], endG = startG;
  for (let i = 1; i < path.length; i++) {
    const l = S[path[i]][2], g = grp[path[i]];
    if (l !== curLine) {
      if (startG !== endG) segs.push(curLine + ':' + startG + '-' + endG);
      curLine = l; startG = g;
    }
    endG = g;
  }
  if (startG !== endG) segs.push(curLine + ':' + startG + '-' + endG);
  return segs.join('>');
}

const COMPANY_COST = 15; // search-only penalty for switching operators (separate fare)
function dijkstraP(srcSet, dstSet, penalty, transferCost) {
  transferCost = transferCost || 0;
  const dist = new Float64Array(N).fill(Infinity);
  const real = new Float64Array(N).fill(Infinity);
  const prev = new Int32Array(N).fill(-1);
  const heap = [];
  for (const s of srcSet) { dist[s] = 0; real[s] = 0; hPush(heap, [0, s]); }
  while (heap.length > 0) {
    const [d, u] = hPop(heap);
    if (d > dist[u]) continue;
    for (const {to: v, w} of adj[u]) {
      const key = Math.min(u,v)*1000+Math.max(u,v);
      // w===0 edge = transfer connection (same/cross-name station)
      let tc = 0;
      if (w === 0) {
        tc = transferCost;
        // Crossing to a different operator incurs a separate fare → heavy search penalty
        if (operatorOf(S[u][2]) !== operatorOf(S[v][2])) tc += COMPANY_COST;
      }
      const nd = d + w + tc + (penalty.get(key)||0);
      if (nd < dist[v]) { dist[v] = nd; real[v] = real[u] + w; prev[v] = u; hPush(heap, [nd, v]); }
    }
  }
  let bestD = Infinity, bestR = 0, bestN = -1;
  for (const d of dstSet) if (dist[d] < bestD) { bestD = dist[d]; bestR = real[d]; bestN = d; }
  if (bestN === -1) return null;
  const same = [...dstSet].filter(d => dist[d] === bestD);
  if (same.length > 1) for (const d of same) {
    if (prev[d] >= 0 && S[prev[d]][2] === S[d][2]) { bestN = d; bestR = real[d]; break; }
  }
  const path = []; let c = bestN; while (c !== -1) { path.push(c); c = prev[c]; } path.reverse();
  while (path.length > 1 && grp[path[0]] === grp[path[1]]) path.shift();
  while (path.length > 1 && grp[path[path.length-1]] === grp[path[path.length-2]]) path.pop();
  return { distance: Math.round(bestR * 10) / 10, path };
}

function findKRoutes(fromName, toName) {
  const srcIds = nameToIds[fromName];
  const dstIds = nameToIds[toName];
  if (!srcIds || !dstIds) return [];
  const srcSet = new Set(srcIds);
  const dstSet = new Set(dstIds);
  addCrossTransferIds(fromName, srcSet);
  addCrossTransferIds(toName, dstSet);

  const results = [];
  const seenSigs = new Set();

  // Search with several transfer-cost levels:
  // tc=0 → pure shortest distance (may zigzag)
  // higher tc → fewer transfers preferred (allows longer detours with fewer changes)
  const TC_LEVELS = [0, 0.6, 1.5, 4, 10, 30];
  for (const tc of TC_LEVELS) {
    const base = dijkstraP(srcSet, dstSet, new Map(), tc);
    if (!base) continue;
    addResult(base);
    // Single-edge blocking to find near alternatives at this transfer-cost level
    const edges = realEdges(base.path);
    for (const key of edges) {
      const alt = dijkstraP(srcSet, dstSet, new Map([[key, 999]]), tc);
      if (alt) addResult(alt);
    }
  }

  // Extra diversity: single-edge blocking on all found routes at tc=0
  const tried1 = new Set();
  for (let ri = 0; ri < results.length; ri++) {
    const edges = realEdges(results[ri].path);
    for (const key of edges) {
      if (tried1.has(key)) continue;
      tried1.add(key);
      const alt = dijkstraP(srcSet, dstSet, new Map([[key, 999]]), 0.6);
      if (alt) addResult(alt);
    }
  }

  function realEdges(path) {
    const keys = [];
    for (let i = 0; i < path.length - 1; i++) {
      const u = path[i], v = path[i+1];
      if (grp[u] !== grp[v]) keys.push(Math.min(u,v)*1000+Math.max(u,v));
    }
    return keys;
  }

  function addResult(route) {
    const sig = routeSig(route.path);
    if (!seenSigs.has(sig)) { seenSigs.add(sig); results.push(route); }
  }

  // Enrich with metadata
  for (const r of results) {
    const segs = getSegments(r.path);
    r.transfers = segs.length - 1;
    // 通過駅数: unique physical stations (by grp), including transfer stations
    const visited = new Set();
    for (const id of r.path) visited.add(grp[id]);
    r.stops = visited.size;
    const fi = calcRouteFare(r.path);
    r.fareInfo = fi;
    r.price = fi.totalTicket; // Metro + JR fare (Toei = free)
    // 会社またぎ回数: operator changes along the path
    let cross = 0;
    for (let i = 1; i < r.path.length; i++) {
      if (operatorOf(S[r.path[i-1]][2]) !== operatorOf(S[r.path[i]][2])) cross++;
    }
    r.cross = cross;
    // おすすめスコア: 距離 + 乗換ペナルティ + 会社またぎペナルティ
    r.score = r.distance + r.transfers * 2 + r.cross * 12;
  }

  results.sort((a, b) => a.score - b.score);
  return results;
}

const FAR_NOTES = {};
function markFar(station, lineA, lineB, note) {

  const idsB = (nameToIds[station]||[]).filter(id => S[id][2] === lineB);

}

}

// === FARE CALCULATION (Metro + JR sections; Toei is free) ===
function calcRouteFare(path) {
  // Split path into operator sections (metro / toei / jr / other)
  if (path.length < 2) return { metroFares: [], totalTicket: 0, totalIC: 0, allMetro: true, hasJR: false, crossCompany: false };
  const sections = [];
  let secStart = 0;
  let secOp = operatorOf(S[path[0]][2]);
  for (let i = 1; i < path.length; i++) {
    const cur = operatorOf(S[path[i]][2]);
    if (cur !== secOp) {
      sections.push({ start: secStart, end: i - 1, op: secOp });
      secStart = i;
      secOp = cur;
    }
  }
  sections.push({ start: secStart, end: path.length - 1, op: secOp });

  // metroFares holds ALL paid fare segments (metro + jr); kept name for display compat
  const metroFares = [];
  let totalTicket = 0, totalIC = 0;
  let paidSections = 0, totalSections = 0;
  let hasJR = false;
  const ops = new Set();
  for (const sec of sections) {
    if (sec.end > sec.start) ops.add(sec.op); // only count operators that actually travel
    if (sec.op !== "metro" && sec.op !== "jr" && sec.op !== "tx" && sec.op !== "keisei") continue;
    totalSections++;
    let dist = 0;
    for (let i = sec.start; i < sec.end; i++) {
      const edge = adj[path[i]].find(e => e.to === path[i + 1]);
      if (edge) dist += edge.w;
    }
    dist = Math.round(dist * 10) / 10;
    if (dist > 0) {
      const fare = sec.op === "jr" ? getJRFare(dist) : sec.op === "tx" ? getTXFare(dist) : sec.op === "keisei" ? getKeiseiFare(dist) : getFare(dist);
      if (sec.op === "jr") hasJR = true;
      metroFares.push({ dist, fare, op: sec.op, line: S[path[sec.start]][2], from: S[path[sec.start]][1], to: S[path[sec.end]][1] });
      totalTicket += fare.ticket;
      totalIC += fare.ic;
      paidSections++;
    }
  }
  // allMetro: single paid section and it's metro and no other operators present
  const crossCompany = ops.size > 1;
  const allMetro = (metroFares.length === 1 && metroFares[0].op === "metro" && !crossCompany);
  return { metroFares, totalTicket, totalIC, allMetro, hasJR, crossCompany };
}

{

// Map a station name to a label showing its lines
function stationLabel(name) {

  const lineNames = [...new Set(ids.map(id => LINES[S[id][2]].name))];

function fillDatalist(prefix, names) {

function updateStations(prefix) {

function calculate() {
  const fromName = document.getElementById("from").value.trim();
  const toName = document.getElementById("to").value.trim();
  const resultEl = document.getElementById("result");

  if (!fromName || !toName) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">出発駅と到着駅を入力してください</div>';
    return;
  }
  if (fromName === toName) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">出発駅と到着駅が同じです</div>';
    return;
  }
  if (!nameToIds[fromName]) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">「' + escHtml(fromName) + '」という駅が見つかりません</div>';
    return;
  }
  if (!nameToIds[toName]) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">「' + escHtml(toName) + '」という駅が見つかりません</div>';
    return;
  }

  lastRoutes = findKRoutes(fromName, toName);
  if (!lastRoutes.length) {
    resultEl.className = "card result show";
    resultEl.innerHTML = '<div class="error">経路が見つかりませんでした</div>';
    return;
  }
  currentSort = 'recommend';
  renderRoutes();
}

let lastRoutes = [];
let currentSort = 'recommend';

function sortRoutes(key) {
  currentSort = key;
  renderRoutes();
}

function renderRoutes() {
  const resultEl = document.getElementById("result");
  const sorted = [...lastRoutes];
  const cmp = {
    recommend:(a,b) => a.score - b.score,
    price:    (a,b) => a.price - b.price || a.distance - b.distance,
    distance: (a,b) => a.distance - b.distance || a.transfers - b.transfers,
    transfers:(a,b) => a.transfers - b.transfers || a.distance - b.distance,
    stops:    (a,b) => a.stops - b.stops || a.distance - b.distance,
  };
  sorted.sort(cmp[currentSort] || cmp.recommend);

  let html = '<div class="sort-bar">';
  html += '<span class="sort-label">並べ替え:</span>';
  const btns = [['recommend','おすすめ'],['price','運賃'],['distance','距離'],['transfers','乗換'],['stops','駅数']];
  for (const [k,label] of btns) {
    html += '<button class="sort-btn' + (currentSort===k?' active':'') + '" onclick="sortRoutes(\'' + k + '\')">' + label + '</button>';
  }
  html += '<span class="sort-count">' + sorted.length + '件</span>';
  html += '</div>';

  for (let ri = 0; ri < sorted.length; ri++) {
    const r = sorted[ri];
    const segments = getSegments(r.path);
    const fi = r.fareInfo;

    html += '<div class="route-card' + (ri === 0 ? ' best' : '') + '">';
    html += '<div class="route-header">';
    html += '<span class="route-num">' + (ri + 1) + '</span>';

    if (fi.metroFares.length > 0) {
      html += '<span class="route-fare">' + fi.totalTicket + '円</span>';
      html += '<span class="route-ic">IC ' + fi.totalIC + '円</span>';
    } else {
      html += '<span class="route-fare" style="color:#888">運賃計算対象なし</span>';
    }

    html += '<span class="route-km">' + r.distance.toFixed(1) + 'km</span>';
    html += '<span class="route-tx">乗換' + r.transfers + '回</span>';
    html += '<span class="route-stops">' + r.stops + '駅</span>';
    html += '</div>';

    // Fare breakdown when multiple paid segments or mixed with free (都営) sections
    if (fi.metroFares.length > 1 || (fi.metroFares.length === 1 && !fi.allMetro)) {
      html += '<div class="fare-breakdown">';
      html += fi.metroFares.map(f => {
        const tag = f.op === "jr" ? "JR" : "メトロ";
        return tag + ' ' + f.from + '→' + f.to + ' <b>' + f.fare.ticket + '円</b>';
      }).join(' ＋ ');
      html += '</div>';
    }

    html += '<div class="route-lines">';
    for (let si = 0; si < segments.length; si++) {
      const seg = segments[si];
      const li = LINES[seg.line];
      if (si > 0) html += '<span class="route-arrow">→</span>';
      html += '<span class="route-line-chip" style="background:' + li.color + '">' + li.name + '</span>';
    }
    html += '</div>';

    // Warnings
    if (fi.crossCompany) {
      html += '<div class="route-warn">⚠ 他社線乗り換えあり（連絡運輸・乗継割引が別途設定されている場合があります）</div>';
    }
    if (fi.hasJR) {
      html += '<div class="route-warn">⚠ JR線は大都市近郊区間の特例（大回り乗車）の対象となる場合があります</div>';
    }

    html += '<details><summary>詳細</summary>';
    html += buildRouteHtml(r.path);
    html += '</details></div>';
  }

  resultEl.className = "card result show";
  resultEl.innerHTML = html;
}

function getSegments(path) {
  const segments = [];
  let curLine = S[path[0]][2], curStations = [path[0]];
  for (let i = 1; i < path.length; i++) {
    const l = S[path[i]][2];
    if (l !== curLine) { segments.push({line:curLine,stations:curStations}); curLine=l; curStations=[path[i]]; }
    else curStations.push(path[i]);
  }
  segments.push({line:curLine,stations:curStations});
  return segments;
}

function buildRouteHtml(path) {
  if (path.length === 0) return "";
  const segments = getSegments(path);

  let html = "";
  for (let si = 0; si < segments.length; si++) {
    const seg = segments[si];
    const li = LINES[seg.line];
    const c = li.color;
    const first = seg.stations[0];
    const last = seg.stations[seg.stations.length - 1];
    const stCount = seg.stations.length;

    html += '<div class="route-station">';
    html += '<div class="route-dot" style="border-color:' + c + '"></div>';
    html += '<div class="route-name">' + escHtml(S[first][1]);
    html += '<span class="line-badge" style="background:' + c + '">' + li.name + '</span>';
    if (si > 0) {
      html += '<span class="route-transfer">乗換</span>';
      const prevSeg = segments[si-1];
      const prevLast = prevSeg.stations[prevSeg.stations.length-1];
      const farNote = getFarNote(prevLast, first);
      if (farNote) html += '<div class="far-note">⚠ ' + escHtml(farNote) + '</div>';
    }
    html += '</div></div>';

    if (stCount > 1) {
      html += '<div class="route-segment">';
      html += '<div class="route-segment-bar" style="background:' + c + '"></div>';
      html += '<div class="route-segment-info">';
      if (stCount > 2) html += (stCount - 2) + '駅';
      html += '</div></div>';

      html += '<div class="route-station">';
      html += '<div class="route-dot" style="border-color:' + c + '"></div>';
      html += '<div class="route-name">' + escHtml(S[last][1]);
      html += '<span class="line-badge" style="background:' + c + '">' + li.name + '</span>';
      html += '</div></div>';
    }

    if (si < segments.length - 1) {
      const nc = LINES[segments[si+1].line].color;
      html += '<div class="route-segment">';
      html += '<div class="route-segment-bar" style="background:linear-gradient(' + c + ',' + nc + ')"></div>';
      html += '<div class="route-segment-info" style="color:#e67e00">⇅ 乗換</div>';
      html += '</div>';
    }
  }
  return html;
}

function isCrossTransfer(a, b) {
  for (const [u, v] of CROSS_TRANSFERS) {
    if ((u === a && v === b) || (u === b && v === a)) return true;
  }
  return false;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

</script>
