// === STATION COMPLEX GROUPS (Union-Find) ===
const uf = Array.from({length: N}, (_, i) => i);
function ufFind(x) { while (uf[x] !== x) { uf[x] = uf[uf[x]]; x = uf[x]; } return x; }
function ufUnion(a, b) { uf[ufFind(a)] = ufFind(b); }

// === MIN-HEAP ===
function hPush(h, e) { h.push(e); let i=h.length-1; while(i>0){const p=(i-1)>>1;if(h[p][0]<=h[i][0])break;[h[p],h[i]]=[h[i],h[p]];i=p;} }
function hPop(h) { const t=h[0];const l=h.pop();if(h.length>0){h[0]=l;let i=0;while(true){let s=i,a=2*i+1,b=2*i+2;if(a<h.length&&h[a][0]<h[s][0])s=a;if(b<h.length&&h[b][0]<h[s][0])s=b;if(s===i)break;[h[i],h[s]]=[h[s],h[i]];i=s;}}return t; }

// === ROUTE FINDING (penalty-based iterative Dijkstra) ===
function routeSig(path) {
  const segs = [];
  let curLine = S[path[0]][2], startG = grp[path[0]], endG = startG;
  for (let i = 1; i < path.length; i++) {
    const l = S[path[i]][2], g = grp[path[i]];
    if (l !== curLine) {
      if (startG !== endG) segs.push(curLine + ':' + startG + '-' + endG);
      curLine = l; startG = g;
    }
    endG = g;
  }
  if (startG !== endG) segs.push(curLine + ':' + startG + '-' + endG);
  return segs.join('>');
}

function dijkstraP(srcSet, dstSet, penalty) {
  const dist = new Float64Array(N).fill(Infinity);
  const real = new Float64Array(N).fill(Infinity);
  const prev = new Int32Array(N).fill(-1);
  const heap = [];
  for (const s of srcSet) { dist[s] = 0; real[s] = 0; hPush(heap, [0, s]); }
  while (heap.length > 0) {
    const [d, u] = hPop(heap);
    if (d > dist[u]) continue;
    for (const {to: v, w} of adj[u]) {
      const key = Math.min(u,v)*1000+Math.max(u,v);
      const nd = d + w + (penalty.get(key)||0);
      if (nd < dist[v]) { dist[v] = nd; real[v] = real[u] + w; prev[v] = u; hPush(heap, [nd, v]); }
    }
  }
  let bestD = Infinity, bestR = 0, bestN = -1;
  for (const d of dstSet) if (dist[d] < bestD) { bestD = dist[d]; bestR = real[d]; bestN = d; }
  if (bestN === -1) return null;
  const same = [...dstSet].filter(d => dist[d] === bestD);
  if (same.length > 1) for (const d of same) {
    if (prev[d] >= 0 && S[prev[d]][2] === S[d][2]) { bestN = d; bestR = real[d]; break; }
  }
  const path = []; let c = bestN; while (c !== -1) { path.push(c); c = prev[c]; } path.reverse();
  while (path.length > 1 && grp[path[0]] === grp[path[1]]) path.shift();
  while (path.length > 1 && grp[path[path.length-1]] === grp[path[path.length-2]]) path.pop();
  return { distance: Math.round(bestR * 10) / 10, path };
}

function findKRoutes(fromName, toName) {
  const srcIds = nameToIds[fromName];
  const dstIds = nameToIds[toName];
  if (!srcIds || !dstIds) return [];
  const srcSet = new Set(srcIds);
  const dstSet = new Set(dstIds);
  addCrossTransferIds(fromName, srcSet);
  addCrossTransferIds(toName, dstSet);

  const results = [];
  const seenSigs = new Set();

  const first = dijkstraP(srcSet, dstSet, new Map());
  if (!first) return [];
  addResult(first);

  // Phase 1: single-edge blocking from each found route
  const tried1 = new Set();
  for (let ri = 0; ri < results.length; ri++) {
    const edges = realEdges(results[ri].path);
    for (const key of edges) {
      if (tried1.has(key)) continue;
      tried1.add(key);
      const alt = dijkstraP(srcSet, dstSet, new Map([[key, 999]]));
      if (alt) addResult(alt);
    }
  }

  // Phase 2: block pairs of edges from each route to find more diverse candidates
  const tried2 = new Set();
  for (let ri = 0; ri < Math.min(results.length, 10); ri++) {
    const edges = realEdges(results[ri].path);
    for (let a = 0; a < edges.length; a++) {
      for (let b = a + 1; b < edges.length; b++) {
        const pk = edges[a] + '|' + edges[b];
        if (tried2.has(pk)) continue;
        tried2.add(pk);
        const alt = dijkstraP(srcSet, dstSet, new Map([[edges[a], 999], [edges[b], 999]]));
        if (alt) addResult(alt);
      }
    }
  }

  function realEdges(path) {
    const keys = [];
    for (let i = 0; i < path.length - 1; i++) {
      const u = path[i], v = path[i+1];
      if (grp[u] !== grp[v]) keys.push(Math.min(u,v)*1000+Math.max(u,v));
    }
    return keys;
  }

  function addResult(route) {
    const sig = routeSig(route.path);
    if (!seenSigs.has(sig)) { seenSigs.add(sig); results.push(route); }
  }

  // Enrich with metadata
  for (const r of results) {
    const segs = getSegments(r.path);
    r.transfers = segs.length - 1;
    // 通過駅数: unique physical stations (by grp), including transfer stations
    const visited = new Set();
    for (const id of r.path) visited.add(grp[id]);
    r.stops = visited.size;
    const fi = calcRouteFare(r.path);
    r.fareInfo = fi;
    r.price = fi.totalTicket; // Metro fare only (Toei = free)
  }

  results.sort((a, b) => a.distance - b.distance || a.transfers - b.transfers);
  return results;
}

// === FARE CALCULATION (Metro sections only) ===
function calcRouteFare(path) {
  // Split path into operator sections (Metro / Toei)
  if (path.length < 2) return { metroFares: [], totalTicket: 0, totalIC: 0, allMetro: true };
  const sections = [];
  let secStart = 0;
  let secIsMetro = isMetro(S[path[0]][2]);
  for (let i = 1; i < path.length; i++) {
    const cur = isMetro(S[path[i]][2]);
    if (cur !== secIsMetro) {
      sections.push({ start: secStart, end: i - 1, metro: secIsMetro });
      secStart = i;
      secIsMetro = cur;
    }
  }
  sections.push({ start: secStart, end: path.length - 1, metro: secIsMetro });

  const metroFares = [];
  let totalTicket = 0, totalIC = 0;
  let allMetro = true;
  for (const sec of sections) {
    if (!sec.metro) { allMetro = false; continue; }
    let dist = 0;
    for (let i = sec.start; i < sec.end; i++) {
      const edge = adj[path[i]].find(e => e.to === path[i + 1]);
      if (edge) dist += edge.w;
    }
    dist = Math.round(dist * 10) / 10;
    if (dist > 0) {
      const fare = getFare(dist);
      metroFares.push({ dist, fare, from: S[path[sec.start]][1], to: S[path[sec.end]][1] });
      totalTicket += fare.ticket;
      totalIC += fare.ic;
    }
  }
  return { metroFares, totalTicket, totalIC, allMetro };
}

function renderRoutes() {

        f.from + '→' + f.to + ' <b>' + f.fare.ticket + '円</b>'

function getSegments(path) {
  const segments = [];
  let curLine = S[path[0]][2], curStations = [path[0]];
  for (let i = 1; i < path.length; i++) {
    const l = S[path[i]][2];
    if (l !== curLine) { segments.push({line:curLine,stations:curStations}); curLine=l; curStations=[path[i]]; }
    else curStations.push(path[i]);
  }
  segments.push({line:curLine,stations:curStations});
  return segments;
}

    html += '<span class="line-badge" style="background:' + c + '">' + li.name + '</span>';
    if (si > 0) {
      html += '<span class="route-transfer">乗換</span>';
      const prevSeg = segments[si-1];
      const prevLast = prevSeg.stations[prevSeg.stations.length-1];
      const farNote = getFarNote(prevLast, first);
      if (farNote) html += '<div class="far-note">⚠ ' + escHtml(farNote) + '</div>';
    }
    html += '</div></div>';

    if (stCount > 1) {
      html += '<div class="route-segment">';
      html += '<div class="route-segment-bar" style="background:' + c + '"></div>';
      html += '<div class="route-segment-info">';
      if (stCount > 2) html += (stCount - 2) + '駅';
      html += '</div></div>';

      html += '<div class="route-station">';
      html += '<div class="route-dot" style="border-color:' + c + '"></div>';
      html += '<div class="route-name">' + escHtml(S[last][1]);
      html += '<span class="line-badge" style="background:' + c + '">' + li.name + '</span>';
      html += '</div></div>';
    }

    if (si < segments.length - 1) {
      const nc = LINES[segments[si+1].line].color;
      html += '<div class="route-segment">';
      html += '<div class="route-segment-bar" style="background:linear-gradient(' + c + ',' + nc + ')"></div>';
      html += '<div class="route-segment-info" style="color:#e67e00">⇅ 乗換</div>';
      html += '</div>';
    }
  }
  return html;
}

function isCrossTransfer(a, b) {
  for (const [u, v] of CROSS_TRANSFERS) {
    if ((u === a && v === b) || (u === b && v === a)) return true;
  }
  return false;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

</script>
