<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>都営バス路線図</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; }
#map { position: fixed; top: 0; left: 0; right: 0; bottom: 44px; }
#panel { position: fixed; bottom: 0; left: 0; right: 0; height: 44px; background: #fff; border-top: 1px solid #ddd;
  display: flex; align-items: center; justify-content: center; gap: 12px; padding: 0 8px; z-index: 1000; font-size: 0.82rem; }
#panel a { color: #0089c7; text-decoration: none; font-weight: 600; }
#panel label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
#info { position: fixed; bottom: 52px; left: 8px; right: 8px; z-index: 1000; pointer-events: none; }
#info div { background: rgba(255,255,255,0.95); border-radius: 8px; padding: 8px 12px; font-size: 0.82rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2); pointer-events: auto; display: none; max-height: 40vh; overflow-y: auto; }
.conn-badge { display: inline-block; background: #0089c7; color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 0.72rem; font-weight: 600; margin: 1px; cursor: pointer; }
</style>
</head>
<body>
<div id="map"></div>
<div id="info"><div id="info-box"></div></div>
<div id="panel">
  <a href="index.html#search">← 検索に戻る</a>
  <label><input type="checkbox" id="chk-train" checked onchange="toggleTrain()"> 鉄道駅</label>
  <label><input type="checkbox" id="chk-edges" checked onchange="toggleEdges()"> 路線</label>
  <span style="color:#888">1666停留所 / 150路線</span>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([35.69, 139.75], 12);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> | バス: <a href="https://creativecommons.org/licenses/by/4.0/deed.ja">CC BY 4.0</a> 東京都交通局',
  maxZoom: 18
}).addTo(map);

let busStops, busEdges, trainConns;
let edgeLayer, trainLayer;

fetch('bus_compact.json').then(r => r.json()).then(d => {
  busStops = d.s; busEdges = d.e; trainConns = d.c;
  buildBusMap();
});

function buildBusMap() {
  const stopMap = new Map();
  for (const [name, lat, lon, rc] of busStops) stopMap.set(name, { lat, lon, rc });

  // Draw edges
  edgeLayer = L.layerGroup();
  for (const [a, b] of busEdges) {
    const sa = stopMap.get(a), sb = stopMap.get(b);
    if (!sa || !sb) continue;
    L.polyline([[sa.lat, sa.lon], [sb.lat, sb.lon]], {
      color: '#2196F3', weight: 1.5, opacity: 0.35
    }).addTo(edgeLayer);
  }
  edgeLayer.addTo(map);

  // Draw bus stops
  for (const [name, lat, lon, rc] of busStops) {
    const r = Math.min(2 + rc * 0.3, 7);
    const m = L.circleMarker([lat, lon], {
      radius: r, fillColor: '#2196F3', color: '#fff', weight: 0.8, fillOpacity: 0.7
    }).addTo(map);
    m.bindTooltip(name, { direction: 'top', offset: [0, -4] });
    m.on('click', () => showStopInfo(name));
  }

  // Train connections
  trainLayer = L.layerGroup();
  const trainStops = new Map();
  for (const [bName, tName, dist] of trainConns) {
    const bs = stopMap.get(bName);
    if (!bs) continue;
    if (!trainStops.has(tName)) trainStops.set(tName, []);
    trainStops.get(tName).push({ bName, dist });
  }

  // Load train station coords from index.html data (already in bus_compact via conns)
  // We need train station positions - extract from index.html
  fetch('index.html').then(r => r.text()).then(html => {
    const cm = [...html.match(/const STATION_COORDS=\{([\s\S]*?)\};/)[1].matchAll(/(\d+):\[([\d.-]+),([\d.-]+)\]/g)];
    const sm = [...html.match(/const S = \[(.*?)\];/s)[1].matchAll(/\[(\d+),"([^"]+)","([^"]+)"\]/g)];
    const trainPos = {};
    for (const [,id,name] of sm) {
      const c = cm.find(x => x[1] === id);
      if (c && !trainPos[name]) trainPos[name] = [parseFloat(c[2]), parseFloat(c[3])];
    }

    for (const [tName, conns] of trainStops) {
      const tp = trainPos[tName];
      if (!tp) continue;
      L.circleMarker(tp, {
        radius: 5, fillColor: '#e03030', color: '#fff', weight: 1.5, fillOpacity: 0.9
      }).addTo(trainLayer).bindTooltip(tName + '駅', { direction: 'top', offset: [0, -6] });

      for (const { bName, dist } of conns) {
        const bs = stopMap.get(bName);
        if (!bs) continue;
        L.polyline([[bs.lat, bs.lon], tp], {
          color: '#e03030', weight: 1, opacity: 0.4, dashArray: '3,4'
        }).addTo(trainLayer);
      }
    }
    trainLayer.addTo(map);
  });
}

function showStopInfo(name) {
  const conns = trainConns.filter(([b]) => b === name);
  const box = document.getElementById('info-box');
  let html = '<b>' + name + '</b>';
  if (conns.length > 0) {
    html += '<div style="margin-top:4px">近くの鉄道駅: ';
    html += conns.map(([, t, d]) =>
      '<span class="conn-badge" onclick="setStation(\'' + t.replace(/'/g, "\\'") + '\')">' + t + ' ' + d + 'm</span>'
    ).join(' ');
    html += '</div>';
  }
  box.innerHTML = html;
  box.style.display = 'block';
}

function setStation(name) {
  const saved = JSON.parse(localStorage.getItem('norikae-form') || '{}');
  if (!saved.from) { saved.from = name; saved.fromLine = ''; }
  else { saved.to = name; saved.toLine = ''; }
  localStorage.setItem('norikae-form', JSON.stringify(saved));
  location.href = 'index.html#search';
}

function toggleEdges() { document.getElementById('chk-edges').checked ? edgeLayer.addTo(map) : edgeLayer.remove(); }
function toggleTrain() { document.getElementById('chk-train').checked ? trainLayer.addTo(map) : trainLayer.remove(); }
</script>
</body>
</html>
